name: Feature Request
description: Suggest an idea to improve GD Resources
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature.
        Share the problem first, then your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: What problem are you trying to solve?
      placeholder: It's hard to...
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Describe the solution you want
      placeholder: Add support for...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives have you considered?
      placeholder: Another option is...
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How much impact would this have?
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues/requests first.
          required: true
